# Local runs
default:  --publish-quiet --format pretty --format html --out reports/cucumber_report.html
headless: --publish-quiet --format pretty --format html --out reports/cucumber_report.html HEADLESS=true

# CI — generates HTML report + rerun file; HEADLESS is set by the CI step env
ci: --publish-quiet --format html --out reports/cucumber_report.html --format rerun --out reports/rerun.txt

# Targeted suites (used by Rakefile and CI jobs)
browser: --publish-quiet --tags @browser --format pretty --format html --out reports/browser_report.html HEADLESS=true
api:     --publish-quiet --tags @api     --format pretty --format html --out reports/api_report.html

# Retry — replays scenarios listed in reports/rerun.txt (pass the file as an arg)
# Saves results to reports/ so rerun outcomes are included in the uploaded artifact
rerun: --publish-quiet --format pretty --format html --out reports/rerun_report.html
